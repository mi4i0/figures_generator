<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>APP-6D Badge Generator → 3MF</title>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>APP-6D → 3MF</h1>
        <p class="subtitle">Генератор друкованих значків NATO APP-6D для Bambu Studio</p>
      </header>

      <main>
        <section class="controls">
          <label class="field">
            <span>SIDC (APP-6D, суцільний або з дефісами)</span>
            <input id="sidc" type="text" spellcheck="false"
                   placeholder="10-0-3-15-0-0-00-111703-00-00"
                   value="10031500001407000000" />
          </label>

          <div class="row">
            <label class="field size-round">
              <span>Діаметр, мм</span>
              <input id="diameter" type="number" min="10" max="80" step="1" value="25" />
            </label>
            <label class="field size-rect" hidden>
              <span>Ширина, мм</span>
              <input id="width" type="number" min="10" max="80" step="1" value="25" />
            </label>
            <label class="field size-rect" hidden>
              <span>Висота, мм</span>
              <input id="height" type="number" min="10" max="80" step="1" value="25" />
            </label>

            <label class="field">
              <span>Кількість, шт</span>
              <input id="count" type="number" min="1" max="200" step="1" value="1" />
            </label>
          </div>

          <label class="field">
            <span>Кріплення</span>
            <select id="mount">
              <option value="none" selected>Без кріплення</option>
              <option value="magnet">Магніт (заглиблення ззаду)</option>
              <option value="peg">Палочка (на підставку)</option>
            </select>
          </label>

          <div class="row mount-magnet" hidden>
            <label class="field">
              <span>Магніт ⌀, мм</span>
              <input id="magnetDia" type="number" min="0" max="20" step="0.05" value="8.15" />
            </label>
            <label class="field">
              <span>Магніт глибина, мм</span>
              <input id="magnetDepth" type="number" min="0" max="4" step="0.1" value="2" />
            </label>
          </div>

          <div class="row mount-peg" hidden>
            <label class="field">
              <span>Палочка ширина, мм</span>
              <input id="pegWidth" type="number" min="1" max="12" step="0.1" value="2.5" />
            </label>
            <label class="field">
              <span>Палочка довжина, мм</span>
              <input id="pegLength" type="number" min="2" max="60" step="0.5" value="30" />
            </label>
            <label class="field">
              <span>Палочка висота, мм</span>
              <input id="pegHeight" type="number" min="0.4" max="10" step="0.1" value="2.5" />
            </label>
          </div>

          <details class="advanced">
            <summary>Додатково (геометрія)</summary>
            <div class="row">
              <label class="field">
                <span>Товщина основи, мм</span>
                <input id="baseThickness" type="number" min="1" max="6" step="0.1" value="2.4" />
              </label>
              <label class="field">
                <span>Висота ліній, мм</span>
                <input id="lineHeight" type="number" min="0.2" max="3" step="0.1" value="0.6" />
              </label>
            </div>
            <div class="row">
              <label class="field">
                <span>Перемичка основи, мм</span>
                <input id="baseBridge" type="number" min="0" max="4" step="0.1" value="1.2" />
              </label>
            </div>
          </details>

          <div class="actions">
            <button id="download" type="button">Завантажити .3mf</button>
          </div>

          <p id="status" class="status"></p>
        </section>

        <section class="previews">
          <div class="preview2d">
            <h2>Символ</h2>
            <div id="svgPreview"></div>
          </div>
          <div class="preview3d">
            <h2>3D</h2>
            <div id="viewer"></div>
            <p class="hint">Магніт: заглиблення показано напівпрозорим (вирізається у слайсері). Палочка: суцільний виступ знизу.</p>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
