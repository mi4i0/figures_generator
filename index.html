<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>APP-6D Badge Generator → 3MF</title>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>APP-6D → 3MF</h1>
        <p class="subtitle">Генератор друкованих значків NATO APP-6D для Bambu Studio</p>
      </header>

      <main>
        <section class="controls">
          <label class="field">
            <span>SIDC (APP-6D, суцільний або з дефісами)</span>
            <input id="sidc" type="text" spellcheck="false"
                   placeholder="10-0-3-15-0-0-00-111703-00-00"
                   value="10031500001407000000" />
          </label>

          <div class="row">
            <label class="field">
              <span>Affiliation</span>
              <select id="affiliation">
                <option value="3">Friend</option>
                <option value="6">Hostile</option>
                <option value="4">Neutral</option>
                <option value="1">Unknown</option>
              </select>
            </label>

            <label class="field">
              <span>Розмір, мм</span>
              <input id="size" type="number" min="10" max="80" step="1" value="25" />
            </label>
          </div>

          <details class="advanced">
            <summary>Додатково (геометрія)</summary>
            <div class="row">
              <label class="field">
                <span>Товщина основи, мм</span>
                <input id="baseThickness" type="number" min="1" max="6" step="0.1" value="2.4" />
              </label>
              <label class="field">
                <span>Висота ліній, мм</span>
                <input id="lineHeight" type="number" min="0.2" max="3" step="0.1" value="0.6" />
              </label>
            </div>
            <div class="row">
              <label class="field">
                <span>Магніт ⌀, мм</span>
                <input id="magnetDia" type="number" min="0" max="20" step="0.1" value="8.2" />
              </label>
              <label class="field">
                <span>Магніт глибина, мм</span>
                <input id="magnetDepth" type="number" min="0" max="4" step="0.1" value="2.2" />
              </label>
            </div>
          </details>

          <div class="actions">
            <button id="download" type="button">Завантажити .3mf</button>
          </div>

          <p id="status" class="status"></p>
        </section>

        <section class="previews">
          <div class="preview2d">
            <h2>Символ</h2>
            <div id="svgPreview"></div>
          </div>
          <div class="preview3d">
            <h2>3D</h2>
            <div id="viewer"></div>
            <p class="hint">Заглиблення під магніт показано напівпрозорим — вирізається у слайсері.</p>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
